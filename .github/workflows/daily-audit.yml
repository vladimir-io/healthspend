name: Daily Hospital Audit Pipeline

on:
  schedule:
    # Run at 2 AM UTC daily (10 PM ET, 9 PM CT, 8 PM MT, 7 PM PT)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      state:
        description: 'Filter to specific state (optional, format: TX)'
        required: false
        default: ''
      full_cpt_coverage:
        description: 'Enable full CPT ingestion (larger data volume)'
        required: false
        default: 'false'
  push:
    branches:
      - main
    paths:
      - 'scraper/src/**'
      - 'scripts/**'
      - '.github/workflows/daily-audit.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Matrix job: audit large states in parallel
  audit_states:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        state: [TX, CA, NY, FL, IL, PA, OH, MI, GA, NC, AZ, CO, WA, MA, VA]
    
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build scraper
        run: |
          cd scraper
          cargo build --release > /tmp/scraper-build.log 2>&1
          tail -100 /tmp/scraper-build.log
          cd ..

      - name: Run discovery for ${{ matrix.state }}
        continue-on-error: true
        run: |
          cd scraper
          cargo run --release --bin scraper -- --discover-only --state ${{ matrix.state }}
          cd ..

      - name: Run audit for ${{ matrix.state }}
        continue-on-error: true
        run: |
          cd scraper
          cargo run --release --bin scraper -- --audit-only --state ${{ matrix.state }}
          cd ..

      - name: Run parser for ${{ matrix.state }}
        continue-on-error: true
        env:
          HS_FULL_CPT_COVERAGE: ${{ github.event.inputs.full_cpt_coverage == 'true' && '1' || '0' }}
        run: |
          cd scraper
          cargo run --release --bin scraper -- --parse-only --state ${{ matrix.state }}
          cd ..

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate output
        continue-on-error: true
        run: |
          python3 scripts/validate_database.py scraper/prices.db || true
          python3 scripts/validate_database.py scraper/compliance.db || true

      - name: Upload intermediate artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ matrix.state }}
          path: scraper/target/debug/logs
          retention-days: 7
          if-no-files-found: ignore

  # Aggregate job: consolidate results and deploy
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: audit_states
    if: always()
    
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run full aggregation
        continue-on-error: false
        run: |
          # Run one more full pass to ensure complete coverage
          cd scraper
          cargo run --release --bin scraper -- > /tmp/scraper-aggregate.log 2>&1
          tail -20 /tmp/scraper-aggregate.log
          cd ..

      - name: Run compliance ingestion
        run: python3 ingest.py

      - name: Validate final database
        run: python3 scripts/validate_database.py web/public/audit_data.db

      - name: Compute metrics
        continue-on-error: true
        run: python3 scripts/compute_metrics.py 2>&1 || echo "Metrics computation failed"

      - name: Generate data manifest
        run: |
          python3 - << 'PY'
          import json
          from datetime import datetime, timezone

          manifest = {
              "version": "1.0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "build_id": "${{ github.run_id }}",
              "pipeline": "github_actions",
              "success": True,
          }

          with open("web/public/data_manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False)
          PY

      - name: Check for parse errors
        continue-on-error: true
        run: |
          sqlite3 scraper/compliance.db "SELECT COUNT(*) as error_count FROM parse_errors WHERE resolved = 0;" || echo "Parse errors table not found"

      - name: Upload final database
        uses: actions/upload-artifact@v4
        with:
          name: final-database
          path: web/public/audit_data.db
          retention-days: 30

      - name: Notify success
        if: success()
        run: |
          echo "✓ Pipeline completed successfully"
          echo "Run ID: ${{ github.run_id }}"
          echo "Timestamp: $(date -Iseconds)"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Pipeline had errors"
          echo "Run ID: ${{ github.run_id }}"
          exit 1

  # Status badge job
  update-badge:
    runs-on: ubuntu-latest
    needs: aggregate
    if: always()
    permissions:
      contents: write
      
    steps:
      - name: Set status
        run: |
          if [ "${{ needs.aggregate.result }}" == "success" ]; then
            echo "BADGE_STATUS=passing" >> $GITHUB_ENV
            echo "BADGE_COLOR=green" >> $GITHUB_ENV
          else
            echo "BADGE_STATUS=failing" >> $GITHUB_ENV
            echo "BADGE_COLOR=red" >> $GITHUB_ENV
          fi

      - name: Log pipeline status
        run: |
          echo "Pipeline Status: ${{ env.BADGE_STATUS }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Timestamp: $(date -Iseconds)"
